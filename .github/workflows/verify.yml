name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests and syntax check
        run: npm run verify

      - name: Check renderer bundle is up to date
        run: |
          npm run build:renderer
          if ! git diff --quiet src/renderer/bundle.js; then
            echo "::error file=src/renderer/bundle.js::src/renderer/bundle.js está desatualizado. Rode 'npm run build:renderer' localmente e commite o resultado."
            git --no-pager diff -- src/renderer/bundle.js | head -60
            exit 1
          fi
